<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Todak Aquarium Diary</title>
<meta name="description" content="An Apple-style aquarium emotion diary app." />
<style>
  :root {
    color-scheme: light dark;
    --bg: #f2f2f7;
    --bg-grouped: #f2f2f7;
    --surface: rgba(255,255,255,0.86);
    --surface-solid: #ffffff;
    --surface-2: #f9f9fb;
    --label: #1c1c1e;
    --label-secondary: rgba(60,60,67,0.78);
    --label-tertiary: rgba(60,60,67,0.50);
    --label-quaternary: rgba(60,60,67,0.30);
    --separator: rgba(60,60,67,0.16);
    --separator-opaque: #c6c6c8;
    --fill-1: rgba(120,120,128,0.12);
    --fill-2: rgba(120,120,128,0.16);
    --blue: #007aff;
    --teal: #30b0c7;
    --indigo: #5856d6;
    --purple: #af52de;
    --pink: #ff2d55;
    --orange: #ff9500;
    --green: #34c759;
    --yellow: #ffcc00;
    --red: #ff3b30;
    --mint: #00c7be;
    --cyan: #32ade6;
    --shadow-card: 0 10px 30px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.04);
    --shadow-sheet: 0 24px 64px rgba(0,0,0,0.18);
    --radius-xl: 28px;
    --radius-lg: 22px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --tap-min: 44px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg-grouped: #1c1c1e;
      --surface: rgba(28,28,30,0.78);
      --surface-solid: #1c1c1e;
      --surface-2: #2c2c2e;
      --label: #ffffff;
      --label-secondary: rgba(235,235,245,0.74);
      --label-tertiary: rgba(235,235,245,0.50);
      --label-quaternary: rgba(235,235,245,0.30);
      --separator: rgba(84,84,88,0.65);
      --separator-opaque: #38383a;
      --fill-1: rgba(120,120,128,0.36);
      --fill-2: rgba(120,120,128,0.32);
    }
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(0,122,255,0.10), transparent 60%),
      radial-gradient(900px 500px at 110% 0%, rgba(48,176,199,0.10), transparent 60%),
      var(--bg);
    color: var(--label);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    letter-spacing: -0.01em;
    line-height: 1.4;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* ===== Top Nav Bar (iOS large title style) ===== */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: saturate(180%) blur(22px);
    -webkit-backdrop-filter: saturate(180%) blur(22px);
    background: var(--surface);
    border-bottom: 0.5px solid var(--separator);
  }
  .navbar-row {
    height: 44px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 12px;
  }
  .nav-btn {
    appearance: none;
    background: transparent;
    border: 0;
    color: var(--blue);
    font: inherit;
    font-size: 17px;
    padding: 8px 10px;
    border-radius: 10px;
    cursor: pointer;
    min-height: 36px;
  }
  .nav-btn:active { opacity: 0.55; }
  .nav-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: center;
  }
  .nav-left { justify-self: start; }
  .nav-right { justify-self: end; }
  .large-title {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.022em;
    padding: 4px 20px 14px;
  }
  /* ===== Content ===== */
  main {
    flex: 1;
    padding: 0 16px 100px;
  }
  .view { display: none; }
  .view.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: none;} }

  /* ===== Hero / Today card ===== */
  .hero {
    margin: 6px 4px 18px;
    padding: 22px;
    border-radius: var(--radius-xl);
    background: linear-gradient(135deg, #4facfe 0%, #00c6fb 50%, #30b0c7 100%);
    color: #fff;
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .hero::after {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(circle at 80% 0%, rgba(255,255,255,0.35), transparent 50%);
    pointer-events: none;
  }
  .hero .date { font-size: 13px; opacity: 0.9; font-weight: 500; }
  .hero h2 { margin: 6px 0 4px; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .hero p { margin: 0; opacity: 0.95; font-size: 15px; }

  /* ===== Section ===== */
  .section-title {
    text-transform: uppercase;
    font-size: 13px;
    font-weight: 600;
    color: var(--label-secondary);
    letter-spacing: 0.02em;
    padding: 18px 20px 8px;
  }
  /* ===== Inset grouped list (iOS Settings) ===== */
  .list {
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    min-height: var(--tap-min);
    background: var(--surface-solid);
    border: 0;
    width: 100%;
    text-align: left;
    color: var(--label);
    font: inherit;
    cursor: pointer;
  }
  .row + .row { border-top: 0.5px solid var(--separator); }
  .row:active { background: var(--fill-1); }
  .row .icon {
    width: 30px; height: 30px;
    border-radius: 7px;
    display: grid; place-items: center;
    color: #fff;
    flex-shrink: 0;
    font-size: 16px;
  }
  .row .label { flex: 1; font-size: 17px; }
  .row .value { color: var(--label-secondary); font-size: 15px; }
  .row .chev {
    color: var(--label-tertiary);
    font-size: 17px;
    margin-left: 4px;
  }
  /* ===== Mood picker ===== */
  .mood-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 14px;
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
  }
  .mood {
    appearance: none;
    border: 0;
    background: var(--fill-1);
    border-radius: 14px;
    aspect-ratio: 1 / 1;
    font-size: 28px;
    cursor: pointer;
    transition: transform .12s ease, background .2s ease;
  }
  .mood:active { transform: scale(0.92); }
  .mood.selected {
    background: linear-gradient(135deg, #007aff, #5856d6);
    box-shadow: 0 8px 18px rgba(0,122,255,0.35);
  }
  /* ===== Textarea ===== */
  .field {
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-card);
    padding: 14px 16px;
  }
  .field textarea {
    width: 100%;
    border: 0;
    resize: none;
    background: transparent;
    color: var(--label);
    font: inherit;
    font-size: 16px;
    min-height: 120px;
    outline: none;
  }
  .field textarea::placeholder { color: var(--label-tertiary); }
  /* ===== Primary button ===== */
  .btn-primary {
    appearance: none;
    border: 0;
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    background: var(--blue);
    color: #fff;
    font: inherit;
    font-size: 17px;
    font-weight: 600;
    box-shadow: 0 10px 24px rgba(0,122,255,0.28);
    cursor: pointer;
    margin-top: 14px;
  }
  .btn-primary:active { transform: scale(0.985); opacity: 0.9; }
  .btn-ghost {
    appearance: none;
    border: 0;
    width: 100%;
    padding: 12px 18px;
    border-radius: 14px;
    background: var(--fill-1);
    color: var(--label);
    font: inherit;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 8px;
  }
  /* ===== Entry list ===== */
  .entries .row .label { display: flex; flex-direction: column; gap: 2px; }
  .entries .row .ttl { font-size: 16px; font-weight: 500; }
  .entries .row .sub { font-size: 13px; color: var(--label-secondary); }
  .entry-mood { font-size: 22px; }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--label-tertiary);
    font-size: 15px;
  }
  /* ===== Tab Bar (bottom) ===== */
  .tabbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 30;
    padding-bottom: env(safe-area-inset-bottom);
    backdrop-filter: saturate(180%) blur(28px);
    -webkit-backdrop-filter: saturate(180%) blur(28px);
    background: var(--surface);
    border-top: 0.5px solid var(--separator);
  }
  .tabbar-inner {
    max-width: 480px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }
  .tab {
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--label-tertiary);
    font: inherit;
    font-size: 10px;
    font-weight: 500;
    padding: 8px 4px 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
  }
  .tab svg { width: 26px; height: 26px; }
  .tab.active { color: var(--blue); }
  /* ===== Language modal (iOS sheet) ===== */
  .sheet-mask {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
    z-index: 40;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .sheet-mask.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    z-index: 41;
    background: var(--bg-grouped);
    border-radius: 18px 18px 0 0;
    max-height: 86dvh;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.22,.61,.36,1);
    box-shadow: var(--shadow-sheet);
    display: flex;
    flex-direction: column;
  }
  .sheet.open { transform: none; }
  .sheet-handle {
    width: 36px; height: 5px;
    background: var(--separator-opaque);
    border-radius: 3px;
    margin: 8px auto 4px;
  }
  .sheet-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 16px 10px;
  }
  .sheet-header h3 { margin: 0; font-size: 17px; font-weight: 600; }
  .sheet-search {
    margin: 4px 16px 10px;
    background: var(--fill-1);
    border-radius: 10px;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
  }
  .sheet-search input {
    border: 0; background: transparent; outline: none;
    font: inherit; font-size: 16px; flex: 1;
    color: var(--label);
  }
  .sheet-body {
    overflow-y: auto;
    padding: 0 16px 24px;
  }
  .lang-list {
    background: var(--surface-solid);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .lang {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; min-height: var(--tap-min);
    cursor: pointer; background: var(--surface-solid);
  }
  .lang + .lang { border-top: 0.5px solid var(--separator); }
  .lang:active { background: var(--fill-1); }
  .lang .flag { font-size: 22px; }
  .lang .name { flex: 1; font-size: 16px; }
  .lang .native { font-size: 13px; color: var(--label-secondary); }
  .lang .check { color: var(--blue); font-weight: 700; opacity: 0; }
  .lang.selected .check { opacity: 1; }
  /* ===== Toast ===== */
  .toast {
    position: fixed; left: 50%; bottom: 100px;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    z-index: 60;
    opacity: 0;
    transition: all .25s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* RTL */
  html[dir="rtl"] body { letter-spacing: 0; }
  html[dir="rtl"] .row .chev { transform: scaleX(-1); }
</style>
</head>
<body>
<div class="app">
  <header class="navbar">
    <div class="navbar-row">
      <div class="nav-left"></div>
      <div class="nav-title" data-i18n="appTitle">Aquarium Diary</div>
      <div class="nav-right">
        <button class="nav-btn" id="quickSettings" aria-label="Settings">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.96l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>
  <main>
    <!-- ===== HOME VIEW ===== -->
    <section class="view active" id="view-home">
      <h1 class="large-title" data-i18n="home">Today</h1>
      <div class="hero">
        <div class="date" id="todayDate">—</div>
        <h2 data-i18n="heroTitle">How is your aquarium feeling today?</h2>
        <p data-i18n="heroSub">Capture a small moment with your fish.</p>
      </div>
      <div class="section-title" data-i18n="moodTitle">Mood</div>
      <div class="mood-grid" id="moodGrid" role="group" aria-label="Mood">
        <button class="mood" data-mood="😄" aria-label="Joy">😄</button>
        <button class="mood" data-mood="🙂" aria-label="Calm">🙂</button>
        <button class="mood" data-mood="😐" aria-label="Neutral">😐</button>
        <button class="mood" data-mood="😢" aria-label="Sad">😢</button>
        <button class="mood" data-mood="😡" aria-label="Angry">😡</button>
      </div>
      <div class="section-title" data-i18n="noteTitle">Note</div>
      <div class="field">
        <textarea id="noteInput" data-i18n-placeholder="notePlaceholder" placeholder="A short note about your fish, water, or mood..."></textarea>
      </div>
      <button class="btn-primary" id="saveEntryBtn" data-i18n="save">Save</button>
    </section>
    <!-- ===== ENTRIES VIEW ===== -->
    <section class="view" id="view-entries">
      <h1 class="large-title" data-i18n="entries">Entries</h1>
      <div id="entryList"></div>
    </section>
    <!-- ===== SETTINGS VIEW ===== -->
    <section class="view" id="view-settings">
      <h1 class="large-title" data-i18n="settings">Settings</h1>
      <div class="section-title" data-i18n="general">General</div>
      <div class="list">
        <button class="row" id="openLangBtn">
          <span class="icon" style="background:var(--blue)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          </span>
          <span class="label" data-i18n="language">Language</span>
          <span class="value" id="currentLangLabel">English</span>
          <span class="chev">›</span>
        </button>
        <div class="row" style="cursor:default">
          <span class="icon" style="background:var(--green)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </span>
          <span class="label" data-i18n="appearance">Appearance</span>
          <span class="value" data-i18n="auto">Automatic</span>
        </div>
      </div>
      <div class="section-title" data-i18n="dataSection">Data</div>
      <div class="list">
        <button class="row" id="clearDataBtn">
          <span class="icon" style="background:var(--red)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
          </span>
          <span class="label" data-i18n="clearAll">Erase all entries</span>
          <span class="chev">›</span>
        </button>
      </div>
      <div class="section-title" data-i18n="aboutSection">About</div>
      <div class="list">
        <div class="row" style="cursor:default">
          <span class="icon" style="background:var(--indigo)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </span>
          <span class="label" data-i18n="version">Version</span>
          <span class="value">2.0.0</span>
        </div>
      </div>
    </section>
  </main>
  <!-- ===== Bottom Tab Bar ===== -->
  <nav class="tabbar">
    <div class="tabbar-inner">
      <button class="tab active" data-view="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span data-i18n="home">Today</span>
      </button>
      <button class="tab" data-view="entries">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M4 9h16M9 4v16"/></svg>
        <span data-i18n="entries">Entries</span>
      </button>
      <button class="tab" data-view="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.96l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span data-i18n="settings">Settings</span>
      </button>
    </div>
  </nav>
</div>
<!-- ===== Language Sheet ===== -->
<div class="sheet-mask" id="sheetMask"></div>
<aside class="sheet" id="langSheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span></span>
    <h3 data-i18n="language">Language</h3>
    <button class="nav-btn" id="closeLangBtn" data-i18n="done">Done</button>
  </div>
  <div class="sheet-search">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="langSearch" data-i18n-placeholder="search" placeholder="Search" />
  </div>
  <div class="sheet-body">
    <div class="lang-list" id="langList"></div>
  </div>
</aside>
<div class="toast" id="toast">Saved</div>
<script>
/* ============================================================
   APPLE SYSTEM LANGUAGES — Chinese variants excluded
   (zh-Hans, zh-Hant, zh-HK intentionally removed)
   ============================================================ */

/* ============================================================
   App state & helpers
   ============================================================ */
const STORE_KEY = "todak.entries.v2";
const LANG_KEY  = "todak.lang.v2";
function loadEntries(){ try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); } catch(e){ return []; } }
function saveEntries(list){ localStorage.setItem(STORE_KEY, JSON.stringify(list)); }
function getLang(){
  const saved = localStorage.getItem(LANG_KEY);
  if (saved) return saved;
  const nav = (navigator.language || "en");
  if (nav.toLowerCase().startsWith("zh")) return "en"; // Chinese excluded per requirement
  const exact = LANGUAGES.find(l => l.code.toLowerCase() === nav.toLowerCase());
  if (exact) return exact.code;
  const base = LANGUAGES.find(l => l.code.toLowerCase() === nav.toLowerCase().split("-")[0]);
  return base ? base.code : "en";
}
function setLang(code){ localStorage.setItem(LANG_KEY, code); applyLang(code); }
function dict(code){
  if (I18N[code]) return I18N[code];
  const base = code.split("-")[0];
  return I18N[base] || I18N.en;
}
function applyLang(code){
  const meta = LANGUAGES.find(l => l.code === code) || LANGUAGES.find(l => l.code === "en");
  document.documentElement.setAttribute("lang", code);
  document.documentElement.setAttribute("dir", meta.dir || "ltr");
  const d = dict(code);
  document.querySelectorAll("[data-i18n]").forEach(el => {
    const k = el.getAttribute("data-i18n");
    if (d[k]) el.textContent = d[k];
  });
  document.querySelectorAll("[data-i18n-placeholder]").forEach(el => {
    const k = el.getAttribute("data-i18n-placeholder");
    if (d[k]) el.setAttribute("placeholder", d[k]);
  });
  document.title = d.appTitle;
  const cl = document.getElementById("currentLangLabel");
  if (cl) cl.textContent = meta.native;
  renderEntries();
  renderTodayDate();
}
function renderTodayDate(){
  const code = getLang();
  const meta = LANGUAGES.find(l => l.code === code) || { code: "en" };
  try {
    const fmt = new Intl.DateTimeFormat(meta.code, { weekday:"long", month:"long", day:"numeric" });
    document.getElementById("todayDate").textContent = fmt.format(new Date());
  } catch(e) {
    document.getElementById("todayDate").textContent = new Date().toDateString();
  }
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(window.__toastTm);
  window.__toastTm = setTimeout(()=> t.classList.remove("show"), 1600);
}

/* ============================================================
   Navigation: tabs & language sheet
   ============================================================ */
function switchView(name){
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.id === "view-" + name));
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === name));
  window.scrollTo({ top: 0, behavior: "smooth" });
}
function openLangSheet(){
  buildLangList();
  document.getElementById("sheetMask").classList.add("open");
  document.getElementById("langSheet").classList.add("open");
}
function closeLangSheet(){
  document.getElementById("sheetMask").classList.remove("open");
  document.getElementById("langSheet").classList.remove("open");
}
function buildLangList(filter){
  const list = document.getElementById("langList");
  const cur = getLang();
  const f = (filter || "").trim().toLowerCase();
  const items = LANGUAGES.filter(l =>
    !f || l.name.toLowerCase().includes(f) || l.native.toLowerCase().includes(f) || l.code.toLowerCase().includes(f)
  );
  list.innerHTML = items.map(l => `
    <div class="lang ${l.code === cur ? "selected" : ""}" data-code="${l.code}">
      <div class="flag">${l.flag}</div>
      <div>
        <div class="name">${l.name}</div>
        <div class="native">${l.native}</div>
      </div>
      <div style="flex:1"></div>
      <div class="check">✓</div>
    </div>`).join("");
  list.querySelectorAll(".lang").forEach(el => {
    el.addEventListener("click", () => {
      const code = el.dataset.code;
      setLang(code);
      buildLangList(document.getElementById("langSearch").value);
      toast(dict(code).saved || "Saved");
      setTimeout(closeLangSheet, 250);
    });
  });
}

/* ============================================================
   Entries
   ============================================================ */
let selectedMood = null;
function renderEntries(){
  const list = loadEntries();
  const el = document.getElementById("entryList");
  if (!el) return;
  const d = dict(getLang());
  if (list.length === 0){
    el.innerHTML = `<div class="empty">${d.empty}</div>`;
    return;
  }
  const code = getLang();
  const fmt = new Intl.DateTimeFormat(code, { month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
  el.innerHTML = `<div class="list entries">` + list.map((e, i) => `
    <div class="row">
      <div class="entry-mood">${e.mood || "🙂"}</div>
      <div class="label">
        <div class="ttl">${(e.note || "").replace(/</g,"&lt;").slice(0,80) || "—"}</div>
        <div class="sub">${fmt.format(new Date(e.ts))}</div>
      </div>
      <button class="nav-btn" data-del="${i}" style="color:var(--red);">✕</button>
    </div>`).join("") + `</div>`;
  el.querySelectorAll("[data-del]").forEach(b => {
    b.addEventListener("click", () => {
      const idx = parseInt(b.dataset.del, 10);
      const arr = loadEntries();
      arr.splice(idx, 1);
      saveEntries(arr);
      renderEntries();
    });
  });
}
function bindHome(){
  document.querySelectorAll(".mood").forEach(m => {
    m.addEventListener("click", () => {
      document.querySelectorAll(".mood").forEach(x => x.classList.remove("selected"));
      m.classList.add("selected");
      selectedMood = m.dataset.mood;
    });
  });
  document.getElementById("saveEntryBtn").addEventListener("click", () => {
    const note = document.getElementById("noteInput").value.trim();
    if (!selectedMood && !note) return;
    const arr = loadEntries();
    arr.unshift({ mood: selectedMood || "🙂", note, ts: Date.now() });
    saveEntries(arr);
    document.getElementById("noteInput").value = "";
    document.querySelectorAll(".mood").forEach(x => x.classList.remove("selected"));
    selectedMood = null;
    toast(dict(getLang()).saved);
    renderEntries();
  });
}

/* ============================================================
   Init
   ============================================================ */
document.addEventListener("DOMContentLoaded", () => {
  // tab bar
  document.querySelectorAll(".tab").forEach(t => {
    t.addEventListener("click", () => switchView(t.dataset.view));
  });
  // quick settings button in nav
  document.getElementById("quickSettings").addEventListener("click", () => switchView("settings"));
  // language sheet
  document.getElementById("openLangBtn").addEventListener("click", openLangSheet);
  document.getElementById("closeLangBtn").addEventListener("click", closeLangSheet);
  document.getElementById("sheetMask").addEventListener("click", closeLangSheet);
  document.getElementById("langSearch").addEventListener("input", (e) => buildLangList(e.target.value));
  // clear data
  document.getElementById("clearDataBtn").addEventListener("click", () => {
    const d = dict(getLang());
    if (confirm(d.confirmClear)) {
      saveEntries([]);
      renderEntries();
      toast(d.saved);
    }
  });
  bindHome();
  applyLang(getLang());
});
